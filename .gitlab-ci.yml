image: node:20-alpine

stages:
  - install
  - check
  - build
  - deploy

cache:
  key:
    files: [pnpm-lock.yaml]
  paths:
    - .pnpm-store/

before_script:
  - npm install -g pnpm
  - pnpm config set store-dir .pnpm-store

# ── 依存インストール ──────────────────────────────────────
install:
  stage: install
  script:
    - pnpm install --frozen-lockfile
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# ── 静的解析 ──────────────────────────────────────────────
lint:
  stage: check
  needs: [install]
  script:
    - pnpm run lint

typecheck:
  stage: check
  needs: [install]
  script:
    - pnpm run typecheck

# ── ビルド ────────────────────────────────────────────────
build:
  stage: build
  needs: [lint, typecheck]
  script:
    - pnpm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  only:
    - main
    - merge_requests

# ── GitLab Pages デプロイ ─────────────────────────────────
pages:
  stage: deploy
  needs: [build]
  script:
    - mv dist public
  artifacts:
    paths:
      - public/
  only:
    - main
  environment:
    name: production
